<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZEUSS — PRESENTATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#c9a84c;--gold-2:#f0d17a;--cyan:#51d7ff;--red:#ff4b52;--cream:#f1ece1;--bg:#030303;
      --panel:rgba(5,5,5,.78);--panel-2:rgba(8,8,8,.9);--line:rgba(201,168,76,.18);--shadow:0 24px 80px rgba(0,0,0,.42);
      --mono:'Share Tech Mono',monospace;--condensed:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif
    }
    @keyframes revealUp{0%{opacity:0;transform:translate3d(0,28px,0) scale(.985)}100%{opacity:1;transform:translate3d(0,0,0) scale(1)}}
    @keyframes revealRight{0%{opacity:0;transform:translate3d(-40px,0,0)}100%{opacity:1;transform:translate3d(0,0,0)}}
    @keyframes revealLeft{0%{opacity:0;transform:translate3d(40px,0,0)}100%{opacity:1;transform:translate3d(0,0,0)}}
    @keyframes glowShift{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(12px,-16px,0) scale(1.06)}}
    @keyframes pulse{0%,100%{opacity:.22}50%{opacity:.5}}
    @keyframes scanline{0%{transform:translateY(-120%)}100%{transform:translateY(140%)}}
    @keyframes targetPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,75,82,.25)}50%{box-shadow:0 0 0 14px rgba(255,75,82,0)}}
    html,body{width:100%;height:100%;background:#000;color:var(--cream);font-family:var(--body);overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body::before,body::after{content:'';position:fixed;inset:0;pointer-events:none}
    body::before{
      background:
        radial-gradient(circle at 18% 16%, rgba(201,168,76,.12), transparent 24%),
        radial-gradient(circle at 84% 72%, rgba(81,215,255,.08), transparent 22%),
        radial-gradient(circle at 70% 18%, rgba(255,75,82,.06), transparent 16%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 28%),
        linear-gradient(120deg, rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size:auto,auto,auto,auto,92px 92px,92px 92px;
      opacity:.95;
      z-index:0
    }
    body::after{
      background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(201,168,76,.10), transparent 20%);
      mix-blend-mode:screen;opacity:.75;z-index:0
    }
    .presentation,.slides-wrapper{position:fixed;inset:0}
    .slides-wrapper{z-index:2}
    .slide{
      position:fixed;inset:0;display:grid;place-items:center;opacity:0;pointer-events:none;overflow:auto;overscroll-behavior:contain;
      padding:clamp(22px,4vw,54px) clamp(14px,2vw,30px) 108px;transform:scale(1.015);
      transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform .6s cubic-bezier(.22,.61,.36,1)
    }
    .slide::before{
      content:'';position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.64), rgba(0,0,0,.24) 28%, rgba(0,0,0,.72)),
        radial-gradient(circle at 12% 22%, rgba(201,168,76,.08), transparent 28%),
        radial-gradient(circle at 88% 72%, rgba(81,215,255,.06), transparent 22%);
    }
    .slide.active{opacity:1;pointer-events:auto;transform:scale(1);z-index:5}
    .slide.leaving{opacity:0;transform:scale(.985) translate3d(0,8px,0)}
    .ambient-glow,.ambient-ring,.ambient-red{position:absolute;border-radius:999px;pointer-events:none;z-index:0}
    .ambient-glow{width:min(42vw,480px);height:min(42vw,480px);top:7%;right:4%;background:radial-gradient(circle, rgba(201,168,76,.16), transparent 68%);filter:blur(12px);animation:glowShift 10s ease-in-out infinite}
    .ambient-ring{width:min(28vw,300px);height:min(28vw,300px);left:4%;bottom:7%;border:1px solid rgba(201,168,76,.15);box-shadow:inset 0 0 42px rgba(201,168,76,.05),0 0 40px rgba(201,168,76,.04)}
    .ambient-red{width:min(24vw,250px);height:min(24vw,250px);left:38%;top:8%;background:radial-gradient(circle, rgba(255,75,82,.10), transparent 70%);filter:blur(16px);animation:pulse 5.5s ease-in-out infinite}
    .slide-content{
      position:relative;z-index:2;width:min(1260px,100%);display:grid;grid-template-columns:minmax(330px,.92fr) minmax(380px,1.08fr);
      gap:clamp(18px,3vw,42px);align-items:center;perspective:1200px
    }
    .slide.reverse .slide-content{grid-template-columns:minmax(380px,1.08fr) minmax(330px,.92fr)}
    .slide.no-image .slide-content,.slide.hero .slide-content{grid-template-columns:1fr;width:min(980px,100%)}
    .slide-card,.media-card{
      position:relative;overflow:hidden;border:1px solid var(--line);background:linear-gradient(180deg, rgba(10,10,10,.66), rgba(4,4,4,.88));
      box-shadow:var(--shadow);transform-style:preserve-3d
    }
    .slide-card{border-radius:28px;padding:clamp(22px,3vw,34px);animation:revealRight .85s cubic-bezier(.22,.61,.36,1) both}
    .slide.reverse .slide-card{animation-name:revealLeft}
    .media-card{min-height:min(72vh,720px);border-radius:30px;animation:revealUp .95s cubic-bezier(.22,.61,.36,1) both}
    .slide-card::before,.media-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 22%);pointer-events:none}
    .slide-card::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.045) 45%, transparent 60%);transform:translateX(-120%);transition:transform .85s cubic-bezier(.22,.61,.36,1);pointer-events:none}
    .slide.active .slide-card::after{transform:translateX(120%)}
    .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;font-family:var(--mono);font-size:clamp(10px,1vw,13px);letter-spacing:.24em;text-transform:uppercase;color:rgba(240,209,122,.98)}
    .eyebrow::before{content:'';width:28px;height:1px;background:linear-gradient(90deg, transparent, var(--gold))}
    h1,h2{font-family:var(--condensed);font-weight:900;letter-spacing:.06em;line-height:.98;text-transform:uppercase;color:var(--cream);text-wrap:balance}
    h1{font-size:clamp(48px,9vw,102px);margin-bottom:16px;text-align:center}
    h2{font-size:clamp(34px,5.2vw,70px);margin-bottom:14px}
    .accent-red{color:var(--red)} .accent-cyan{color:var(--cyan)} .accent-gold{color:var(--gold-2)}
    .subtitle{font-family:var(--mono);font-size:clamp(11px,1.2vw,14px);line-height:1.6;letter-spacing:.16em;text-transform:uppercase;color:rgba(240,209,122,.98);margin-bottom:16px}
    .description,.bullet-list,.metric-grid{font-size:clamp(15px,1.6vw,18px);line-height:1.68;color:rgba(241,236,225,.92)}
    .divider{width:74px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:14px 0 16px}
    .bullet-list{list-style:none;display:grid;gap:10px}
    .bullet-list.compact{gap:8px}
    .bullet-list li{position:relative;padding-left:18px}
    .bullet-list li::before{content:'';position:absolute;left:0;top:.68em;width:7px;height:7px;border-radius:999px;background:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.3)}
    .metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px;margin-top:4px}
    .metric{padding:12px 13px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01))}
    .metric strong{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:rgba(240,209,122,.95);margin-bottom:6px;text-transform:uppercase}
    .media-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.02);transition:transform .8s cubic-bezier(.22,.61,.36,1), filter .5s ease;filter:brightness(.72) contrast(1.04) saturate(.96)}
    .media-card::after{
      content:'';position:absolute;inset:0;z-index:1;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.42) 56%, rgba(0,0,0,.76)),
        linear-gradient(135deg, rgba(201,168,76,.18), transparent 22%, transparent 76%, rgba(81,215,255,.12))
    }
    .scanline{position:absolute;inset:-22% 0 auto 0;height:30%;background:linear-gradient(180deg, transparent, rgba(255,255,255,.07), transparent);mix-blend-mode:screen;animation:scanline 6s linear infinite;z-index:2;pointer-events:none}
    .target-lock{
      position:absolute;right:24px;top:24px;z-index:2;width:58px;height:58px;border-radius:999px;border:1px solid rgba(255,75,82,.45);
      animation:targetPulse 2.6s ease-out infinite
    }
    .target-lock::before,.target-lock::after{content:'';position:absolute;inset:10px;border-radius:999px;border:1px solid rgba(255,75,82,.3)}
    .media-caption{position:absolute;left:18px;right:18px;bottom:18px;z-index:3;display:flex;justify-content:space-between;gap:12px;align-items:end;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:rgba(241,236,225,.88);text-transform:uppercase}
    .media-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:rgba(4,4,4,.58);border:1px solid rgba(255,255,255,.1)}
    .media-tag::before{content:'';width:7px;height:7px;border-radius:999px;background:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.45);animation:pulse 2.2s ease-in-out infinite}
    .hero .slide-card{text-align:center;padding:clamp(34px,5vw,58px);background:linear-gradient(180deg, rgba(0,0,0,.48), rgba(5,5,5,.8))}
    .hero .subtitle,.hero .description{max-width:820px;margin-left:auto;margin-right:auto}
    .hero .divider{margin-left:auto;margin-right:auto;background:linear-gradient(90deg, transparent, var(--gold), var(--red), transparent)}
    .hero-media{position:absolute;inset:0;z-index:1;overflow:hidden}
    .hero-media video,.hero-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.42) contrast(1.08) saturate(.92)}
    .hero h1{ text-shadow:0 0 38px rgba(201,168,76,.18), 0 0 80px rgba(255,75,82,.08)}
    .deck-divider .slide-card{text-align:center}
    .kicker-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
    .kicker-strip span{padding:8px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase}
    .nav-buttons,.float-nav,.status,.page-counter,.scroll-hint,.loading{position:fixed;z-index:30;font-family:var(--mono)}
    .nav-buttons{left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:10px;padding:7px;border-radius:999px;border:1px solid rgba(201,168,76,.16);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.32)}
    .nav-btn,.float-btn{cursor:pointer;color:var(--gold);border:1px solid rgba(201,168,76,.24);background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(201,168,76,.08));transition:transform .2s ease,border-color .2s ease,background .2s ease}
    .nav-btn{padding:12px 18px;min-width:116px;border-radius:999px;letter-spacing:.18em;font-size:11px}
    .nav-btn:hover,.float-btn:hover{transform:translateY(-2px);border-color:var(--gold);background:linear-gradient(180deg, rgba(201,168,76,.18), rgba(201,168,76,.1))}
    .float-nav{right:16px;top:16px;display:flex;flex-direction:column;gap:10px}
    .float-btn{width:52px;height:52px;border-radius:16px;font-size:10px;letter-spacing:.12em;display:grid;place-items:center;text-align:center;line-height:1.12}
    .status{left:18px;bottom:20px;font-size:10px;letter-spacing:.12em;color:rgba(201,168,76,.6);line-height:1.55}
    .page-counter{right:20px;bottom:22px;font-size:11px;letter-spacing:.16em;color:rgba(201,168,76,.66);text-align:right}
    .scroll-hint{left:50%;bottom:84px;transform:translateX(-50%);font-size:10px;letter-spacing:.24em;color:rgba(201,168,76,.40);pointer-events:none}
    .loading{inset:0;display:grid;place-items:center;background:#000;letter-spacing:.2em}
    .loading.hidden{display:none}
    #particleCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.28;mix-blend-mode:screen}
    .mobile-only{display:none}
    @media (max-width:980px){
      .slide-content,.slide.reverse .slide-content{grid-template-columns:1fr}
      .slide-card,.slide.reverse .slide-card,.media-card{animation-name:revealUp}
    }
    @media (max-width:768px){
      html,body{overflow:hidden}
      body::before{background:
        radial-gradient(circle at 16% 12%, rgba(201,168,76,.10), transparent 24%),
        radial-gradient(circle at 84% 72%, rgba(81,215,255,.06), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 26%)
      }
      .slide{place-items:start center;padding:14px 10px 106px}
      .slide::before{background:linear-gradient(180deg, rgba(0,0,0,.7), rgba(0,0,0,.25) 22%, rgba(0,0,0,.76)), radial-gradient(circle at 12% 10%, rgba(201,168,76,.06), transparent 26%)}
      .slide-content,.slide.reverse .slide-content,.slide.no-image .slide-content,.slide.hero .slide-content{width:min(100%,520px);gap:12px}
      .slide-card{order:2;padding:16px 14px 16px;border-radius:22px;background:linear-gradient(180deg, rgba(8,8,8,.82), rgba(3,3,3,.94))}
      .media-card{order:1;min-height:unset;aspect-ratio:1/1.02;border-radius:22px}
      .media-card img{filter:brightness(.84) contrast(1.02) saturate(.94)}
      h1{font-size:clamp(34px,13vw,56px)}
      h2{font-size:clamp(26px,9vw,40px);margin-bottom:10px}
      .eyebrow{font-size:9px;letter-spacing:.16em;margin-bottom:9px}
      .subtitle{font-size:10px;letter-spacing:.10em;line-height:1.45;margin-bottom:10px}
      .description,.bullet-list,.metric-grid{font-size:14px;line-height:1.56}
      .bullet-list{gap:7px}
      .bullet-list li{padding-left:15px}
      .metric-grid{grid-template-columns:1fr;gap:8px}
      .metric{padding:11px 12px;border-radius:14px}
      .divider{width:54px;margin:11px 0 13px}
      .media-caption{left:12px;right:12px;bottom:12px;font-size:9px;letter-spacing:.08em}
      .media-caption span:last-child{display:none}
      .scanline,.ambient-red{display:none}
      .ambient-glow{width:54vw;height:54vw;top:4%}
      .ambient-ring{display:none}
      .float-nav{top:auto;bottom:70px;right:10px}
      .float-btn{width:44px;height:44px;border-radius:12px;font-size:8px}
      .nav-buttons{bottom:10px;width:calc(100% - 20px);justify-content:center;padding:6px}
      .nav-btn{min-width:0;flex:1;padding:11px 10px;font-size:10px}
      .status,.page-counter{bottom:72px;font-size:9px}
      .status{left:10px}.page-counter{right:10px}
      .scroll-hint{display:none}
      .mobile-only{display:block}
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>

function createBulletList(items, compact){
  if(!items || !items.length) return '';
  return `<ul class="bullet-list ${compact ? 'compact' : ''}">${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
}
function createMetricGrid(metrics){
  if(!metrics || !metrics.length) return '';
  return `<div class="metric-grid">${metrics.map(([k,v]) => `<div class="metric"><strong>${k}</strong>${v}</div>`).join('')}</div>`;
}
function renderDividerSlide(title){
  return `
  <div class="slide no-image deck-divider">
    <div class="ambient-glow"></div><div class="ambient-ring"></div><div class="ambient-red"></div>
    <div class="slide-content">
      <article class="slide-card">
        <div class="eyebrow">Extended Presentation</div>
        <h2>${title}</h2>
        <div class="divider"></div>
        <div class="description">The second half was re-paced into shorter sections for cleaner mobile reading, harder visual impact, and faster progression.</div>
        <div class="kicker-strip"><span>Shorter copy</span><span>More aggressive</span><span>Mobile-first</span><span>Lighter interactions</span></div>
      </article>
    </div>
  </div>`;
}
function renderSlide(slide,index){
  if(slide.dividerTitle) return renderDividerSlide(slide.dividerTitle);
  const hasImage=!!slide.image;
  const reverse=slide.imagePos==='left';
  const slideClasses=['slide', slide.type==='hero'?'hero':'', !hasImage?'no-image':'', reverse?'reverse':''].filter(Boolean).join(' ');
  const titleTag=slide.type==='hero'?'h1':'h2';
  const textContent = `
    <article class="slide-card" data-tilt>
      ${slide.eyebrow ? `<div class="eyebrow">${slide.eyebrow}</div>` : ''}
      <${titleTag}>${slide.title}</${titleTag}>
      ${slide.subtitle ? `<div class="subtitle">${slide.subtitle}</div>` : ''}
      ${(slide.subtitle || slide.description || slide.bullets || slide.metrics) ? '<div class="divider"></div>' : ''}
      ${slide.description ? `<div class="description">${slide.description}</div>` : ''}
      ${createBulletList(slide.bullets, slide.compact)}
      ${createMetricGrid(slide.metrics)}
    </article>`;
  const mediaContent = hasImage ? `
    <figure class="media-card" data-tilt>
      <img src="${slide.image}" alt="${String(slide.title).replace(/<[^>]+>/g,'')}">
      ${!isMobile ? '<div class="scanline"></div>' : ''}
      ${index > 12 && !isMobile ? '<div class="target-lock"></div>' : ''}
      <figcaption class="media-caption">
        <span class="media-tag">${slide.tag || `Slide ${index+1}`}</span>
        <span>visual reference</span>
      </figcaption>
    </figure>` : '';
  if(slide.type==='hero'){
    return `
    <div class="${slideClasses}">
      <div class="hero-media">${slide.video ? `<video autoplay muted loop playsinline><source src="${slide.video}" type="video/mp4"></video>` : ''}</div>
      <div class="ambient-glow"></div><div class="ambient-ring"></div><div class="ambient-red"></div>
      <div class="slide-content">${textContent}</div>
    </div>`;
  }
  return `
  <div class="${slideClasses}">
    <div class="ambient-glow"></div><div class="ambient-ring"></div><div class="ambient-red"></div>
    <div class="slide-content">${reverse ? mediaContent + textContent : textContent + mediaContent}</div>
  </div>`;
}

function loadSlides(){
  slidesWrapper.innerHTML = slideDeck.map(renderSlide).join('');
  totalSlides = document.querySelectorAll('.slide').length;
  document.getElementById('total-pages').textContent = totalSlides;
  document.querySelectorAll('.slide')[0]?.classList.add('active');
  document.getElementById('loading').classList.add('hidden');
  setupEventListeners();
  if(!isMobile && !prefersReducedMotion) setupTilt();
}

function showSlide(nextIndex){
  if(isTransitioning || nextIndex<0 || nextIndex>=totalSlides || nextIndex===currentSlide) return;
  isTransitioning = true;
  const slides = document.querySelectorAll('.slide');
  slides[currentSlide]?.classList.remove('active');
  slides[currentSlide]?.classList.add('leaving');
  setTimeout(()=>slides[currentSlide]?.classList.remove('leaving'), 620);
  slides[nextIndex]?.classList.add('active');
  currentSlide = nextIndex;
  document.getElementById('current-page').textContent = currentSlide + 1;
  burstParticles();
  setTimeout(()=>{ isTransitioning = false; }, 620);
}

function setupEventListeners(){
  document.getElementById('next').addEventListener('click',()=>showSlide(currentSlide+1));
  document.getElementById('prev').addEventListener('click',()=>showSlide(currentSlide-1));
  document.getElementById('first-slide').addEventListener('click',()=>showSlide(0));
  document.getElementById('logout').addEventListener('click',()=>{ sessionStorage.removeItem(SESSION_KEY); window.location.href='login.html'; });

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight' || e.key===' '){ e.preventDefault(); showSlide(currentSlide+1); }
    if(e.key==='ArrowLeft'){ e.preventDefault(); showSlide(currentSlide-1); }
  });

  document.addEventListener('wheel',e=>{
    const now = Date.now();
    if(now-lastScrollTime<scrollDebounce) return;
    lastScrollTime = now;
    showSlide(currentSlide + (e.deltaY>0 ? 1 : -1));
  }, {passive:true});

  let touchStartY=0,touchStartX=0;
  document.addEventListener('touchstart',e=>{
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
  }, {passive:true});
  document.addEventListener('touchend',e=>{
    const touchEndY=e.changedTouches[0].clientY;
    const touchEndX=e.changedTouches[0].clientX;
    const diffY=touchStartY-touchEndY;
    const diffX=Math.abs(touchStartX-touchEndX);
    const now=Date.now();
    if(Math.abs(diffY)>48 && diffX<90 && now-lastScrollTime>=scrollDebounce){
      lastScrollTime = now;
      showSlide(currentSlide + (diffY>0 ? 1 : -1));
    }
  }, {passive:true});
}

// Lighter particle system
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d', { alpha:true });
let particles=[], rafMouse=null;
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas();
addEventListener('resize', resizeCanvas);

class Particle{
  constructor(x,y,vx,vy,size,life){ this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.size=size; this.life=life; }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.02; this.life-=0.018; }
  draw(){
    ctx.fillStyle=`rgba(201,168,76,${Math.max(this.life,0)*0.22})`;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
  }
}
function burstParticles(){
  if(isMobile || prefersReducedMotion) return;
  const count = 10;
  for(let i=0;i<count;i++){
    particles.push(new Particle(innerWidth*(.25+Math.random()*.5), innerHeight*(.2+Math.random()*.45), (Math.random()-.5)*2, (Math.random()-.5)*2, Math.random()*1.8+.8, 1));
  }
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p=>p.life>0);
  for(const p of particles){ p.update(); p.draw(); }
  requestAnimationFrame(animateParticles);
}
if(!isMobile && !prefersReducedMotion){
  animateParticles();
  window.addEventListener('mousemove', e => {
    document.body.style.setProperty('--mx', `${e.clientX}px`);
    document.body.style.setProperty('--my', `${e.clientY}px`);
    if(rafMouse) return;
    rafMouse = requestAnimationFrame(()=>{
      if(Math.random()>.7 && particles.length<80){
        particles.push(new Particle(e.clientX, e.clientY, (Math.random()-.5)*1.2, (Math.random()-.5)*1.2, Math.random()*1.3+.5, .7));
      }
      rafMouse = null;
    });
  }, {passive:true});
} else {
  canvas.style.display='none';
}

function setupTilt(){
  document.querySelectorAll('[data-tilt]').forEach(el=>{
    const slide = el.closest('.slide');
    let frame = null;
    function reset(){ el.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg) translate3d(0,0,0)'; }
    slide?.addEventListener('mousemove', e=>{
      if(!slide.classList.contains('active')) return;
      if(frame) return;
      frame = requestAnimationFrame(()=>{
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - .5;
        const y = (e.clientY - r.top) / r.height - .5;
        el.style.transform = `perspective(1200px) rotateX(${(-y*5).toFixed(2)}deg) rotateY(${(x*7).toFixed(2)}deg) translate3d(${(x*6).toFixed(2)}px, ${(y*6).toFixed(2)}px, 0)`;
        frame = null;
      });
    }, {passive:true});
    slide?.addEventListener('mouseleave', reset);
    reset();
  });
}

loadSlides();
