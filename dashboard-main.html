<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZEUSS — PRESENTATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;300;400;600;700;800;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --gold: #C9A84C;
      --cream: #F0EBE0;
      --black: #000000;
      --mono: 'Share Tech Mono', monospace;
      --condensed: 'Barlow Condensed', sans-serif;
      --body: 'Barlow', sans-serif;
    }

    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(20px); } }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes slide-in { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes morph { 0%, 100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; } }
    @keyframes fade-up { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes clip-reveal { 0% { clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); } 100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } }
    @keyframes skew-in { 0% { opacity: 0; transform: skewY(10deg) scale(0.9); } 100% { opacity: 1; transform: skewY(0) scale(1); } }
    @keyframes glitch-shift { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-2px); } 40% { transform: translateX(2px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
    @keyframes rotate-in { 0% { opacity: 0; transform: rotate(-5deg) scale(0.8); } 100% { opacity: 1; transform: rotate(0) scale(1); } }
    @keyframes slide-left { 0% { opacity: 0; transform: translateX(100px); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes slide-right { 0% { opacity: 0; transform: translateX(-100px); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes wow-out { 0% { opacity: 1; transform: scale(1) rotateX(0deg) rotateY(0deg); filter: blur(0px); } 50% { transform: scale(1.1) rotateX(45deg) rotateY(-20deg); } 100% { opacity: 0; transform: scale(0.3) rotateX(90deg) rotateY(45deg); filter: blur(20px); } }
    @keyframes wow-exit-left { 0% { opacity: 1; transform: translateX(0) rotateY(0deg) scale(1); } 100% { opacity: 0; transform: translateX(-150%) rotateY(-90deg) scale(0.5); filter: blur(15px); } }
    @keyframes wow-exit-right { 0% { opacity: 1; transform: translateX(0) rotateY(0deg) scale(1); } 100% { opacity: 0; transform: translateX(150%) rotateY(90deg) scale(0.5); filter: blur(15px); } }

    html, body {
      width: 100%; height: 100vh;
      background: #000;
      color: var(--cream);
      font-family: var(--body);
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .presentation {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.05) 0%, rgba(0,0,0,1) 70%);
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      padding: 40px 20px;
      overflow: auto;
      will-change: opacity, transform;
      transform: translate3d(0, 0, 0);
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
      z-index: 10;
      animation: fade-up 0.8s ease;
    }

    .slide.exiting {
      animation: wow-out 0.6s ease forwards;
    }

    .slide::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(201,168,76,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(201,168,76,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .graphic-element {
      position: absolute;
      opacity: 0.15;
      z-index: 0;
      will-change: transform;
    }

    .graphic-circle {
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      animation: float 6s ease-in-out infinite;
    }

    .graphic-morph {
      width: 200px; height: 200px;
      background: linear-gradient(135deg, var(--gold), rgba(201,168,76,0.5));
      animation: morph 8s ease-in-out infinite, float 7s ease-in-out infinite;
    }

    .slide-content {
      max-width: 1200px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      position: relative;
      z-index: 10;
    }

    .slide-text {
      flex: 1;
      min-width: 0;
      text-align: left;
      animation: slide-right 0.8s ease;
    }

    .slide-text.center {
      flex: none;
      width: 100%;
      text-align: center;
      animation: fade-up 0.8s ease;
    }

    .slide.has-image .slide-content {
      align-items: stretch;
    }

    .slide.has-image .slide-text {
      position: relative;
      align-self: center;
      max-width: 500px;
      padding: 24px 26px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(3,3,3,0.62) 0%, rgba(3,3,3,0.84) 100%);
      border: 1px solid rgba(201,168,76,0.18);
      box-shadow: 0 28px 80px rgba(0,0,0,0.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .slide.has-image .slide-text.center {
      max-width: 840px;
      margin: 0 auto;
    }

    .slide.no-image .slide-text,
    .slide.video-slide .video-overlay {
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
    }

    .slide.has-image .slide-text::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 30%);
      opacity: 0.9;
    }

    .subtitle .bullet-item,
    .description .bullet-item {
      display: inline-block;
      white-space: normal;
    }

    .subtitle .bullet-item + .bullet-item::before,
    .description .bullet-item + .bullet-item::before {
      content: '•';
      color: var(--gold);
      margin: 0 10px 0 8px;
      opacity: 0.9;
    }


    .slide-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
      position: relative;
      overflow: hidden;
    }

    .slide-image.right {
      animation: rotate-in 0.8s ease 0.2s both;
    }

    .slide-image.left {
      order: -1;
      animation: skew-in 0.8s ease 0.2s both;
    }

    .slide-image.hidden {
      display: none !important;
    }

    .slide-image img {
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(201,168,76,0.3);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      animation: clip-reveal 0.8s ease 0.3s both;
      will-change: transform;
    }

    .slide-image.hidden {
      display: none !important;
    }

    @keyframes scale-in {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @media (min-width: 768px) {
      .slide {
        padding: 60px;
      }
    }

    @media (max-width: 1024px) {
      .slide-content {
        gap: 30px;
      }
    }

    @media (max-width: 768px) {
      .slide {
        padding: 22px 14px 92px;
      }

      .slide-content {
        gap: 14px;
        padding: 0;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 124px);
      }

      .slide-text {
        text-align: left;
        order: 2;
        z-index: 20;
        width: min(100%, 320px);
        max-width: 320px;
        margin: 0 auto;
        padding: 16px 16px 18px;
        border: 1px solid rgba(255,255,255,0.08);
        background:
          linear-gradient(180deg, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0.90) 100%);
        backdrop-filter: blur(12px) saturate(112%);
        -webkit-backdrop-filter: blur(12px) saturate(112%);
        border-radius: 22px;
        box-shadow:
          0 18px 50px rgba(0,0,0,0.45),
          inset 0 1px 0 rgba(255,255,255,0.06);
      }

      .slide-text.center {
        text-align: center;
      }

      .slide.has-image .slide-text::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(255,255,255,0.02) 36%, rgba(201,168,76,0.08) 100%);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        padding: 1px;
      }

      .slide-image {
        width: 100%;
        order: 1;
        position: fixed !important;
        inset: 0;
        flex: none;
        justify-content: center;
        z-index: 1;
        margin: 0 !important;
      }

      .slide-image:not(.hidden) {
        background:
          linear-gradient(180deg, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.16) 28%, rgba(0,0,0,0.44) 58%, rgba(0,0,0,0.80) 100%);
      }

      .slide-image img {
        max-height: 100vh !important;
        max-width: 100vw !important;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        border-radius: 0;
        box-shadow: none;
        z-index: 0;
        filter: brightness(0.68) saturate(0.94) contrast(1.02);
      }

      .slide-image.hidden {
        display: none !important;
      }

      .slide h2 {
        font-size: clamp(20px, 6vw, 30px);
        line-height: 1.04;
        margin-bottom: 12px;
        text-shadow: 0 3px 20px rgba(0,0,0,0.45);
      }

      .slide .subtitle {
        font-size: 10px;
        letter-spacing: 0.14em;
        line-height: 1.45;
        margin-bottom: 12px;
      }

      .slide .description {
        font-size: 13px;
        line-height: 1.55;
        color: rgba(240,235,224,0.94);
      }

      .slide .divider {
        width: 64px;
        margin: 12px 0 14px;
      }

      .subtitle .bullet-item,
      .description .bullet-item {
        display: block;
        margin: 0 0 5px 0;
      }
    }

    .pdf-content {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .pdf-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(201,168,76,0.15);
      animation: fade-up 0.8s ease 0.2s both;
    }

    .slide h1 {
      font-family: var(--condensed);
      font-size: clamp(40px, 10vw, 80px);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--cream);
      margin-bottom: 20px;
      animation: slide-in 0.8s ease;
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    .slide h2 {
      font-family: var(--condensed);
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--cream);
      margin-bottom: 30px;
      line-height: 1.2;
      animation: slide-in 0.8s ease 0.1s both;
      text-shadow: 0 0 20px rgba(201,168,76,0.2);
      will-change: transform;
    }

    .slide .subtitle {
      font-family: var(--mono);
      font-size: clamp(12px, 2.2vw, 14px);
      color: rgba(230, 196, 103, 0.98);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: slide-in 0.8s ease 0.15s both;
      will-change: transform;
      text-shadow: 0 1px 12px rgba(0,0,0,0.32);
    }

    .slide .description {
      font-size: clamp(15px, 2vw, 18px);
      color: rgba(240,235,224,0.88);
      line-height: 1.7;
      margin: 18px 0 0;
      font-weight: 400;
      animation: slide-in 0.8s ease 0.2s both;
      will-change: transform;
      text-shadow: 0 1px 14px rgba(0,0,0,0.28);
    }

    .slide .quote {
      font-size: clamp(14px, 4vw, 20px);
      color: rgba(240,235,224,0.6);
      font-style: italic;
      margin: 30px 0;
      border-left: 2px solid var(--gold);
      padding-left: 20px;
      animation: slide-in 0.8s ease 0.25s both;
    }

    .slide ul {
      list-style: none;
      text-align: left;
      display: inline-block;
      margin: 20px 0;
      animation: slide-in 0.8s ease 0.2s both;
    }

    .slide li {
      padding: 10px 0;
      font-size: clamp(14px, 3.5vw, 16px);
      color: rgba(240,235,224,0.8);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      animation: fade-up 0.8s ease both;
    }

    .slide li:nth-child(1) { animation-delay: 0.3s; }
    .slide li:nth-child(2) { animation-delay: 0.35s; }
    .slide li:nth-child(3) { animation-delay: 0.4s; }
    .slide li:nth-child(4) { animation-delay: 0.45s; }
    .slide li:nth-child(5) { animation-delay: 0.5s; }

    .slide li::before {
      content: '▸ ';
      color: var(--gold);
      font-weight: bold;
      margin-right: 10px;
    }

    .divider {
      width: 100px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto;
      animation: slide-in 0.8s ease 0.15s both;
    }

    /* Video Slide */
    .video-slide {
      background: #000;
    }

    .video-player {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      z-index: 1;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(201,168,76,0.15) 50%, rgba(0,0,0,0.6));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      flex-direction: column;
    }

    .video-title {
      font-family: var(--condensed);
      font-size: clamp(36px, 12vw, 80px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--cream);
      text-shadow: 0 0 40px rgba(201,168,76,0.5), 0 0 20px rgba(0,0,0,0.8);
      margin-bottom: 20px;
      animation: slide-in 1s ease;
      z-index: 10;
    }

    .video-subtitle {
      font-family: var(--mono);
      font-size: clamp(12px, 3vw, 16px);
      color: var(--gold);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
      animation: slide-in 1s ease 0.2s both;
      z-index: 10;
    }

    .svg-container {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* Navigation */
    .nav-buttons {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 100;
      padding: 0 20px;
    }

    .nav-btn {
      padding: 12px 20px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: #000;
      transform: scale(1.05);
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 640px) {
      .nav-btn {
        padding: 10px 14px;
        font-size: 10px;
      }
    }

    /* Float buttons */
    .float-nav {
      position: fixed;
      right: 20px;
      top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .float-btn {
      width: 50px; height: 50px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      text-align: center;
      overflow: hidden;
    }

    .float-btn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
      transform: scale(1.08);
    }

    .float-btn:active {
      transform: scale(0.92);
    }

    @media (max-width: 640px) {
      .float-btn {
        width: 45px;
        height: 45px;
        font-size: 9px;
      }
      
      .float-nav {
        right: 15px;
        top: 15px;
        gap: 10px;
      }
    }

    /* Status */
    .status {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(201,168,76,0.6);
      z-index: 100;
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      .status {
        bottom: 20px;
        left: 20px;
        font-size: 9px;
      }
    }

    .page-counter {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(201,168,76,0.6);
      letter-spacing: 0.1em;
      z-index: 100;
      text-align: right;
    }

    @media (max-width: 640px) {
      .page-counter {
        bottom: 20px;
        right: 20px;
        font-size: 10px;
      }
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 200;
      font-family: var(--mono);
      color: var(--gold);
      letter-spacing: 0.2em;
    }

    .loading.hidden { display: none; }

    .scroll-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(201,168,76,0.4);
      letter-spacing: 0.1em;
      z-index: 50;
      animation: float 3s ease-in-out infinite;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div>
    <div style="margin-bottom: 20px;">LOADING PRESENTATION</div>
    <div style="font-size: 12px; color: rgba(201,168,76,0.6);">● ● ●</div>
  </div>
</div>

<div class="presentation" id="presentation">
  <div class="slides-wrapper" id="slidesWrapper">
    <!-- Slides will be populated by JavaScript -->
  </div>
</div>

<!-- Navigation -->
<div class="nav-buttons">
  <button class="nav-btn" id="prev">← PREV</button>
  <button class="nav-btn" id="next">NEXT →</button>
</div>

<div class="float-nav">
  <button class="float-btn" id="first-slide" title="Go to first slide">⇤<br>FIRST</button>
  <button class="float-btn" id="logout" title="Exit">🚪<br>EXIT</button>
</div>

<div class="status">
  <div><span style="color:var(--gold);">●</span> SYSTEM</div>
  <div><span style="color:var(--gold);">●</span> ACTIVE</div>
</div>

<div class="page-counter">
  <span id="current-page">1</span> / <span id="total-pages">13</span>
</div>

<div class="scroll-hint">SCROLL OR SWIPE TO NAVIGATE</div>

<canvas id="particleCanvas" style="position:fixed;inset:0;z-index:1;mix-blend-mode:screen;opacity:0.3;pointer-events:none;"></canvas>

<script>
  // Auth check
  const SESSION_KEY = 'zeuss_auth';
  if (sessionStorage.getItem(SESSION_KEY) !== 'true') {
    window.location.href = 'login.html';
  }

  // Setup PDF.js
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  let currentSlide = 0;
  let totalSlides = 15;
  let isTransitioning = false;
  let lastScrollTime = 0;
  const scrollDebounce = 300;
  let slidesLoaded = false;

  // Particle System
  class Particle {
    constructor(x, y, vx, vy, size) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.size = size;
      this.life = 1;
      this.decay = 0.015;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.1;
      this.life -= this.decay;
      this.size *= 0.98;
    }

    draw(ctx) {
      ctx.fillStyle = `rgba(201, 168, 76, ${this.life * 0.3})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];
  let mouseX = canvas.width / 2;
  let mouseY = canvas.height / 2;

  window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    if (Math.random() > 0.85) {
      particles.push(new Particle(
        mouseX + (Math.random() - 0.5) * 30,
        mouseY + (Math.random() - 0.5) * 30,
        (Math.random() - 0.5) * 2,
        (Math.random() - 0.5) * 2,
        Math.random() * 1.5 + 0.5
      ));
    }
  });

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles = particles.filter(p => p.life > 0);
    
    particles.forEach(p => {
      p.update();
      p.draw(ctx);
    });

    requestAnimationFrame(animateParticles);
  }

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  animateParticles();


function renderTextBlock(textValue, className, tagName = 'div') {
  if (!textValue) return '';
  const safeText = String(textValue).trim();
  if (!safeText) return '';
  if (safeText.includes(' • ')) {
    const items = safeText.split(' • ').map(item => item.trim()).filter(Boolean);
    return `<div class="${className} ${className}--list">${items.map(item => `<span>${item}</span>`).join('')}</div>`;
  }
  return `<${tagName} class="${className}">${safeText}</${tagName}>`;
}

  // Load slides with images and text content
  function loadSlides() {
    const wrapper = document.getElementById('slidesWrapper');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatBulletText(value, className) {
      if (!value) return '';
      const parts = String(value)
        .split('•')
        .map(part => part.trim())
        .filter(Boolean);

      if (parts.length <= 1) {
        return `<div class="${className}">${escapeHtml(value)}</div>`;
      }

      return `<div class="${className}">` +
        parts.map(part => `<span class="bullet-item">${escapeHtml(part)}</span>`).join('') +
      `</div>`;
    }

    const slidesData = [
      {
        title: 'INTERCEPTOR',
        subtitle: 'ZEUSS Interceptor is a next-generation autonomous system designed to detect, track, and neutralize aerial threats in real time',
        description: '',
        imagePos: 'hidden',
        image: null
      },
      {
        title: 'MODERN AERIAL THREATS',
        subtitle: 'Shahed-class drones • Speed: ~165 km/h • Low altitude / hard to detect • Low-cost, high-impact',
        description: 'We are facing a new type of threat: low-cost drones capable of bypassing traditional defense systems.',
        imagePos: 'left',
        image: 'assets/images/img36.jpg'
      },
      {
        title: 'INEFFICIENCY of TRADITIONAL DEFENCE',
        subtitle: 'High cost per interception • Slow response time • Limited coverage',
        description: 'Using high-cost missiles against low-cost drones is not sustainable. You can’t fight a $20,000 drone with a $1M missile.',
        imagePos: 'right',
        image: 'assets/images/img41.jpg'
      },
      {
        title: 'ZEUSS SYSTEM ARCHITECTURE',
        subtitle: 'Detection network (acoustic + AI) • Real-time tracking • Autonomous interceptor',
        description: 'ZEUSS integrates detection, intelligence, and interception into a single scalable system',
        imagePos: 'left',
        image: 'assets/images/img47.jpg'
      },
      {
        title: 'DETECTION → TRACKING → INTERCEPTION',
        subtitle: 'Acoustic detection (network-based, up to ~15 km) • AI classification • Trajectory prediction • Automatic launch',
        description: 'ZEUSS does not wait for the threat — it anticipates and intercepts it.',
        imagePos: 'right',
        image: 'assets/images/img53.jpg'
      },
      {
        title: '400 KM/H SPEED',
        subtitle: '',
        description: '',
        imagePos: 'left',
        image: 'assets/images/img58.jpg'
      },
      {
        title: 'TECHNICAL OVERVIEW',
        subtitle: 'Speed: 400 km/h • Payload: 2 kg • Endurance: 29 minutes (+15) • Modes',
        description: 'Autonomous AI • Manual control • Sentinel mode • Mesh mode • ZEUSS is faster than the threat',
        imagePos: 'right',
        image: 'assets/images/img63.jpg'
      },
      {
        title: 'TARGETING SYSTEM',
        subtitle: 'Smart Detection & Lock • Acoustic signature recognition • AI-based classification',
        description: 'Real-time tracking • Target lock & follow • Manual sentinel. The system identifies and locks onto targets based on their unique acoustic signature and geometric radar.',
        imagePos: 'left',
        image: 'assets/images/img68.jpg'
      },
      {
        title: 'INTERCEPTION',
        subtitle: 'Active Neutralization • High-speed interception • Direct engagement • Payload-based neutralization',
        description: 'ZEUSS physically reaches and neutralizes the target.',
        imagePos: 'right',
        image: 'assets/images/img74.jpg'
      },
      {
        title: 'COMPETITIVE ADVANTAGE',
        subtitle: 'Why ZEUSS Wins',
        description: 'Faster than target drones • Low-cost interception • Scalable system • Rapid deployment • Passive detection capability',
        imagePos: 'left',
        image: 'assets/images/img79.jpg'
      },
      {
        title: 'DEPLOYMENT',
        subtitle: 'Applications',
        description: 'Coastal defense • Critical infrastructure • Military bases • Town building protection • Ports & strategic assets. ZEUSS transforms defense from reactive to active',
        imagePos: 'hidden',
        image: null
      },
      {
        title: 'BUILT TO INTERCEPT. DESIGNED TO WIN.',
        subtitle: '',
        description: '',
        imagePos: 'left',
        image: 'assets/images/img89.jpg'
      }
    ];

    // Video slide (slide 0)
    const videoSlide = document.createElement('div');
    videoSlide.className = 'slide active video-slide';
    videoSlide.innerHTML = `
      <video class="video-player" autoplay muted loop style="position:fixed;inset:0;">
        <source src="assets/videos/zeusz-demo.mp4" type="video/mp4">
      </video>
      <svg class="svg-container" viewBox="0 0 1920 1080">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:rgb(201,168,76);stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:0" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle cx="1920" cy="0" r="400" fill="url(#grad1)" filter="url(#glow)"/>
        <circle cx="0" cy="1080" r="350" fill="url(#grad1)" filter="url(#glow)"/>
      </svg>
      <div class="video-overlay">
        <h1 class="video-title">ZEUSS</h1>
        <p class="video-subtitle">Next Generation Interceptor System</p>
      </div>
    `;
    wrapper.appendChild(videoSlide);

    // Content slides with extracted text and associated images
    slidesData.forEach((content, index) => {
      const slide = document.createElement('div');

      const hasImage = !!content.image;
      slide.className = `slide ${hasImage ? 'has-image' : 'no-image'}`;
      const textClass = !hasImage || content.imagePos === 'hidden' ? 'slide-text center' : 'slide-text';
      const imageClass = hasImage ? `slide-image ${content.imagePos}` : 'slide-image hidden';
      const subtitleHtml = content.subtitle ? formatBulletText(content.subtitle, 'subtitle') : '';
      const dividerHtml = (content.subtitle || content.description) ? '<div class="divider"></div>' : '';
      const descriptionHtml = content.description ? formatBulletText(content.description, 'description') : '';
      const imageHtml = hasImage ? `<img src="${content.image}" alt="Slide ${index + 1}" loading="lazy">` : '';

      slide.innerHTML = `
        <div class="graphic-element graphic-circle" style="top: 10%; left: 5%; opacity:0.08;"></div>
        <div class="graphic-element graphic-morph" style="bottom: 15%; right: 8%; opacity:0.08;"></div>
        <div class="slide-content">
          <div class="${textClass}">
            <h2>${content.title}</h2>
            ${subtitleHtml}
            ${dividerHtml}
            ${descriptionHtml}
          </div>
          <div class="${imageClass}">
            ${imageHtml}
          </div>
        </div>
      `;
      wrapper.appendChild(slide);

      document.getElementById('loading').innerHTML = `
        <div>
          <div style="margin-bottom: 20px;">LOADING SLIDES</div>
          <div style="font-size: 12px; color: rgba(201,168,76,0.6);">
            ${index + 1} / ${slidesData.length}
          </div>
        </div>
      `;
    });

    totalSlides = 1 + slidesData.length;
    document.getElementById('total-pages').textContent = totalSlides;
    document.getElementById('loading').classList.add('hidden');
    slidesLoaded = true;
    setupEventListeners();
    setupParallaxEffect();
  }

  function showSlide(n) {
    if (!slidesLoaded || isTransitioning || n < 0 || n >= totalSlides) return;

    isTransitioning = true;
    const slides = document.querySelectorAll('.slide');
    
    // Wow exit effect per slide attiva
    const activeSlide = document.querySelector('.slide.active');
    if (activeSlide) {
      activeSlide.classList.remove('active');
      activeSlide.classList.add('exiting');
      setTimeout(() => {
        activeSlide.classList.remove('exiting');
      }, 600);
    }
    
    // Mostra la nuova slide
    if (slides[n]) {
      slides[n].classList.add('active');
      // Trigger reflow per animazione
      void slides[n].offsetWidth;
    }
    
    document.getElementById('current-page').textContent = n + 1;
    currentSlide = n;

    // Spawn particles
    for (let i = 0; i < 15; i++) {
      particles.push(new Particle(
        Math.random() * canvas.width,
        Math.random() * canvas.height,
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 4,
        Math.random() * 2.5 + 0.8
      ));
    }

    setTimeout(() => {
      isTransitioning = false;
    }, 600);
  }

  function setupEventListeners() {
    // Navigation buttons
    document.getElementById('next').addEventListener('click', () => {
      if (currentSlide < totalSlides - 1) {
        showSlide(currentSlide + 1);
      }
    });

    document.getElementById('prev').addEventListener('click', () => {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    });

    document.getElementById('first-slide').addEventListener('click', () => {
      showSlide(0);
    });

    document.getElementById('logout').addEventListener('click', () => {
      sessionStorage.removeItem(SESSION_KEY);
      window.location.href = 'login.html';
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        if (currentSlide < totalSlides - 1) {
          showSlide(currentSlide + 1);
        }
      } else if (e.key === 'ArrowLeft') {
        if (currentSlide > 0) {
          showSlide(currentSlide - 1);
        }
      }
    });

    // Mouse wheel scroll
    document.addEventListener('wheel', (e) => {
      const now = Date.now();
      if (now - lastScrollTime < scrollDebounce) return;
      lastScrollTime = now;

      if (e.deltaY > 0) {
        if (currentSlide < totalSlides - 1) {
          showSlide(currentSlide + 1);
        }
      } else if (e.deltaY < 0) {
        if (currentSlide > 0) {
          showSlide(currentSlide - 1);
        }
      }
    }, { passive: true });

    // Touch swipe
    let touchStartY = 0;
    let touchStartX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const touchEndY = e.changedTouches[0].clientY;
      const touchEndX = e.changedTouches[0].clientX;
      const diffY = touchStartY - touchEndY;
      const diffX = Math.abs(touchStartX - e.changedTouches[0].clientX);

      if (Math.abs(diffY) > 50 && diffX < 100) {
        const now = Date.now();
        if (now - lastScrollTime < scrollDebounce) return;
        lastScrollTime = now;

        if (diffY > 0) {
          if (currentSlide < totalSlides - 1) {
            showSlide(currentSlide + 1);
          }
        } else {
          if (currentSlide > 0) {
            showSlide(currentSlide - 1);
          }
        }
      }
    }, { passive: true });
  }

  function setupParallaxEffect() {
    const slides = document.querySelectorAll('.slide:not(.video-slide)');
    
    // Mouse tracking parallax on images
    slides.forEach((slide) => {
      const img = slide.querySelector('.slide-image img');
      const textEl = slide.querySelector('.slide-text');
      
      if (!img && !textEl) return;

      slide.addEventListener('mousemove', (e) => {
        const rect = slide.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        const offsetX = (x - 0.5) * 30;
        const offsetY = (y - 0.5) * 30;

        if (img && !img.parentElement.classList.contains('hidden')) {
          img.style.transform = `translate(${offsetX * 0.5}px, ${offsetY * 0.5}px) scale(1.08)`;
          img.style.transition = 'none';
        }

        if (textEl) {
          const rotX = (y - 0.5) * 8;
          const rotY = (x - 0.5) * -8;
          textEl.style.transform = `perspective(1200px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
          textEl.style.transition = 'none';
        }
      });

      slide.addEventListener('mouseleave', () => {
        if (img && !img.parentElement.classList.contains('hidden')) {
          img.style.transform = 'translate(0, 0) scale(1)';
          img.style.transition = 'all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        }
        if (textEl) {
          textEl.style.transform = 'perspective(1200px) rotateX(0) rotateY(0)';
          textEl.style.transition = 'all 0.3s ease';
        }
      });
    });

    // Advanced 3D text effect on h2
    const titles = document.querySelectorAll('.slide h2');
    titles.forEach(title => {
      const parentSlide = title.closest('.slide');
      if (!parentSlide) return;

      parentSlide.addEventListener('mousemove', (e) => {
        const rect = parentSlide.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const x = (e.clientX - rect.left - centerX) / centerX;
        const y = (e.clientY - rect.top - centerY) / centerY;
        
        const rotX = y * 6;
        const rotY = x * -6;
        const shiftX = x * 8;
        
        title.style.transform = `perspective(1200px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateX(${shiftX}px)`;
        title.style.transition = 'none';
      });

      parentSlide.addEventListener('mouseleave', () => {
        title.style.transform = 'perspective(1200px) rotateX(0) rotateY(0) translateX(0)';
        title.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      });
    });

    // Stagger animation on description text
    const descriptions = document.querySelectorAll('.slide .description');
    descriptions.forEach((desc) => {
      const slide = desc.closest('.slide');
      if (slide?.classList.contains('active')) {
        desc.style.animation = `slide-in 0.8s ease 0.2s both`;
      }
    });
  }

  // Load slides when page is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSlides);
  } else {
    loadSlides();
  }
</script>
