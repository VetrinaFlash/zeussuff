<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZEUSS — PRESENTATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;300;400;600;700;800;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --gold: #C9A84C;
      --cream: #F0EBE0;
      --black: #000000;
      --mono: 'Share Tech Mono', monospace;
      --condensed: 'Barlow Condensed', sans-serif;
      --body: 'Barlow', sans-serif;
    }

    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(20px); } }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes slide-in { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes morph { 0%, 100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; } }
    @keyframes fade-up { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes clip-reveal { 0% { clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); } 100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } }
    @keyframes skew-in { 0% { opacity: 0; transform: skewY(10deg) scale(0.9); } 100% { opacity: 1; transform: skewY(0) scale(1); } }
    @keyframes glitch-shift { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-2px); } 40% { transform: translateX(2px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
    @keyframes rotate-in { 0% { opacity: 0; transform: rotate(-5deg) scale(0.8); } 100% { opacity: 1; transform: rotate(0) scale(1); } }
    @keyframes slide-left { 0% { opacity: 0; transform: translateX(100px); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes slide-right { 0% { opacity: 0; transform: translateX(-100px); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes wow-out { 0% { opacity: 1; transform: scale(1) rotateX(0deg) rotateY(0deg); filter: blur(0px); } 50% { transform: scale(1.1) rotateX(45deg) rotateY(-20deg); } 100% { opacity: 0; transform: scale(0.3) rotateX(90deg) rotateY(45deg); filter: blur(20px); } }
    @keyframes wow-exit-left { 0% { opacity: 1; transform: translateX(0) rotateY(0deg) scale(1); } 100% { opacity: 0; transform: translateX(-150%) rotateY(-90deg) scale(0.5); filter: blur(15px); } }
    @keyframes wow-exit-right { 0% { opacity: 1; transform: translateX(0) rotateY(0deg) scale(1); } 100% { opacity: 0; transform: translateX(150%) rotateY(90deg) scale(0.5); filter: blur(15px); } }
    @keyframes scan-line { 0% { top: -100%; } 100% { top: 200%; } }
    @keyframes text-flicker { 0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.4; } 97% { opacity: 1; } 98% { opacity: 0.2; } 99% { opacity: 1; } }
    @keyframes border-pulse { 0%, 100% { border-color: rgba(201,168,76,0.3); box-shadow: 0 0 0 rgba(201,168,76,0); } 50% { border-color: rgba(201,168,76,0.8); box-shadow: 0 0 20px rgba(201,168,76,0.2); } }
    @keyframes zoom-bg { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
    @keyframes slide-up-reveal { 0% { opacity: 0; transform: translateY(60px) skewY(2deg); } 100% { opacity: 1; transform: translateY(0) skewY(0deg); } }
    @keyframes char-in { 0% { opacity: 0; transform: translateY(20px) rotateX(-40deg); } 100% { opacity: 1; transform: translateY(0) rotateX(0deg); } }
    @keyframes noise-drift { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

    html, body {
      width: 100%; height: 100vh;
      background: #000;
      color: var(--cream);
      font-family: var(--body);
      overflow: hidden;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
    }

    .presentation {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.05) 0%, rgba(0,0,0,1) 70%);
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      padding: 40px 20px;
      overflow: auto;
      will-change: opacity, transform;
      transform: translate3d(0, 0, 0);
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
      z-index: 10;
      animation: fade-up 0.8s ease;
    }

    .slide.exiting {
      z-index: 1 !important;
      animation: wow-out 0.6s ease forwards;
    }

    .slide::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(201,168,76,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(201,168,76,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .graphic-element {
      position: absolute;
      opacity: 0.15;
      z-index: 0;
      will-change: transform;
    }

    .graphic-circle {
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      animation: float 6s ease-in-out infinite;
    }

    .graphic-morph {
      width: 200px; height: 200px;
      background: linear-gradient(135deg, var(--gold), rgba(201,168,76,0.5));
      animation: morph 8s ease-in-out infinite, float 7s ease-in-out infinite;
    }

    .slide-content {
      max-width: 1200px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      position: relative;
      z-index: 10;
      margin: 0 auto;
    }

    .slide-text {
      flex: 1;
      min-width: 0;
      text-align: left;
      animation: slide-right 0.8s ease;
    }

    .slide-text.center {
      flex: none;
      width: 100%;
      text-align: center;
      animation: fade-up 0.8s ease;
    }

    .slide.has-image .slide-content {
      align-items: stretch;
    }

    .slide.has-image .slide-text {
      position: relative;
      align-self: center;
      max-width: 500px;
      padding: 24px 26px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(3,3,3,0.62) 0%, rgba(3,3,3,0.84) 100%);
      border: 1px solid rgba(201,168,76,0.18);
      box-shadow: 0 28px 80px rgba(0,0,0,0.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .slide.has-image .slide-text.center {
      max-width: 840px;
      margin: 0 auto;
    }

    .slide.no-image {
      background: #000 !important;
    }

    .slide.no-image .slide-text,
    .slide.video-slide .video-overlay {
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
    }

    .slide.no-image.hero-text-slide .slide-content {
      justify-content: center;
      align-items: center;
    }

    .slide.no-image.hero-text-slide .slide-text {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .slide.has-image .slide-text::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 30%);
      opacity: 0.9;
    }

    .subtitle .bullet-item,
    .description .bullet-item {
      display: inline-block;
      white-space: normal;
    }

    .subtitle .bullet-item + .bullet-item::before,
    .description .bullet-item + .bullet-item::before {
      content: '•';
      color: var(--gold);
      margin: 0 10px 0 8px;
      opacity: 0.9;
    }


    .slide-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
      position: relative;
      overflow: hidden;
    }

    .slide-image.right {
      animation: rotate-in 0.8s ease 0.2s both;
    }

    .slide-image.left {
      order: -1;
      animation: skew-in 0.8s ease 0.2s both;
    }

    .slide-image.hidden {
      display: none !important;
    }

    .slide-image img {
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(201,168,76,0.3);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      animation: clip-reveal 0.8s ease 0.3s both;
      will-change: transform;
    }

    .slide-image.hidden {
      display: none !important;
    }

    @keyframes scale-in {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @media (min-width: 768px) {
      .slide {
        padding: 60px;
      }
    }

    @media (max-width: 1024px) {
      .slide-content {
        gap: 30px;
      }
    }

    

    /* Standardized slide proportions */
    .slide-content {
      max-width: 1320px;
      gap: 48px;
      align-items: center;
    }

    .slide.has-image .slide-content,
    .slide.zeuss-slide.side-by-side {
      display: grid;
      grid-template-columns: minmax(0, 470px) minmax(0, 1fr);
      gap: 48px;
      align-items: center;
    }

    .slide.has-image .slide-image,
    .slide.zeuss-slide.side-by-side .slide-image {
      width: 100%;
      max-width: none;
      display: block;
      overflow: visible;
      perspective: none;
    }

    .slide.has-image .slide-image.left,
    .slide.zeuss-slide.side-by-side .slide-image.left {
      order: 0;
    }

    .slide.has-image .slide-image.right,
    .slide.zeuss-slide.side-by-side .slide-image.right {
      order: 2;
    }

    .slide.has-image .slide-text,
    .slide.zeuss-slide.side-by-side .slide-text,
    .hero-text-slide .slide-text {
      width: 100%;
      max-width: 470px;
      max-height: none;
      overflow: visible;
      padding: 28px 30px;
      border-radius: 24px;
    }

    .slide.has-image .slide-image img,
    .slide.zeuss-slide.side-by-side .slide-image img {
      width: 100%;
      height: min(62vh, 680px);
      max-width: none;
      max-height: none;
      object-fit: cover;
      object-position: center center;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.34);
      clip-path: none;
      animation: clip-reveal 0.8s ease 0.2s both;
    }

    .hero-text-slide .slide-image img {
      height: min(72vh, 760px);
      filter: brightness(0.52) saturate(0.95) contrast(1.04);
    }

    .slide h2 {
      font-size: clamp(34px, 4.6vw, 58px);
      line-height: 1.02;
      margin-bottom: 16px;
      letter-spacing: 0.06em;
    }

    .slide .subtitle {
      font-size: clamp(11px, 1.2vw, 13px);
      line-height: 1.45;
      margin-bottom: 12px;
      letter-spacing: 0.18em;
    }

    .slide .description,
    .zeuss-bullets li {
      font-size: clamp(14px, 1.12vw, 16px);
      line-height: 1.52;
    }

    .zeuss-bullets { margin-top: 10px; }
    .zeuss-bullets li { padding: 5px 0; }
    .divider { margin: 12px 0 14px; }

@media (max-width: 768px) {
      .slide.no-image {
        background: #000 !important;
      }

      .slide.no-image .slide-content,
      .slide.no-image.hero-text-slide .slide-content {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 96px);
        padding: 24px 18px;
      }

      .slide.no-image .slide-text,
      .slide.no-image.hero-text-slide .slide-text {
        position: relative !important;
        left: auto !important;
        right: auto !important;
        bottom: auto !important;
        top: auto !important;
        transform: none !important;
        width: min(100%, 560px);
        max-width: 560px;
        margin: 0 auto;
        padding: 24px 22px 26px;
        border: 1px solid rgba(201,168,76,0.18);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.94) 100%);
        box-shadow: 0 22px 60px rgba(0,0,0,0.28);
        text-align: center;
      }

      .slide.no-image .divider,
      .slide.no-image.hero-text-slide .divider {
        margin-left: auto;
        margin-right: auto;
      }

      .status { display: none !important; }

      .slide {
        padding: 0 0 96px;
        overflow: hidden;
      }

      .slide-content,
      .slide.has-image .slide-content,
      .slide.zeuss-slide.side-by-side,
      .zeuss-slide.side-by-side .slide-content,
      .hero-text-slide .slide-content {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        gap: 0;
      }

      .slide-image,
      .slide.zeuss-slide.side-by-side .slide-image {
        position: relative !important;
        width: 100%;
        height: auto;
        max-width: 100%;
        margin: 0 !important;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 300px;
        max-height: 60vh;
        overflow: hidden;
      }

      .slide-image img,
      .slide.zeuss-slide.side-by-side .slide-image img,
      .hero-text-slide .slide-image img,
      .zeuss-slide .slide-image img {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain;
        object-position: center center;
        border-radius: 0;
        box-shadow: none;
        clip-path: none;
        filter: brightness(0.48) saturate(0.92) contrast(1.05);
        animation: zoom-bg 10s ease-out both;
      }

      .slide.has-image .slide-text,
      .slide.has-image.hero-text-slide .slide-text,
      .slide.has-image.zeuss-slide.side-by-side .slide-text {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        z-index: 20;
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 14px 16px 16px;
        border: none;
        border-top: 1px solid rgba(201,168,76,0.22);
        border-radius: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.78) 24%, rgba(0,0,0,0.92) 56%, rgba(0,0,0,0.98) 100%);
        box-shadow: none;
        backdrop-filter: blur(10px) saturate(112%);
        -webkit-backdrop-filter: blur(10px) saturate(112%);
        overflow: visible;
        min-height: auto;
        max-height: none;
      }

      .slide-text.center {
        text-align: center;
      }

      .tag-badge {
        font-size: 8px;
        letter-spacing: 0.14em;
        padding: 3px 8px;
        margin-bottom: 8px;
      }

      .slide h2,
      .hero-text-slide h2 {
        font-size: clamp(24px, 7.6vw, 34px) !important;
        line-height: 1.02 !important;
        letter-spacing: 0.05em !important;
        margin-bottom: 10px;
      }

      .slide .subtitle {
        font-size: 10px;
        line-height: 1.42;
        letter-spacing: 0.12em;
        margin-bottom: 8px;
      }

      .slide .description,
      .zeuss-bullets li,
      .stat-value {
        font-size: 12px;
        line-height: 1.5;
      }

      .slide .description { margin-top: 8px; }
      .zeuss-bullets { margin-top: 8px; }
      .zeuss-bullets li { padding: 4px 0; }
      .divider { width: 52px; margin: 10px 0 10px; }

      .stat-grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }

      .stat-item { padding: 8px 9px; }
      .stat-label { font-size: 8px; }

      .nav-buttons { bottom: 20px; }
      .status { display: none !important; }
      .page-counter { bottom: 20px; right: 18px; }
      .scroll-hint { display: none; }
    }

    @media (max-width: 420px) {
      .slide-text,
      .slide.has-image .slide-text,
      .slide.zeuss-slide.side-by-side .slide-text,
      .hero-text-slide .slide-text {
        padding: 16px 16px 18px;
      }

      .slide h2,
      .hero-text-slide h2 {
        font-size: clamp(22px, 8vw, 30px) !important;
      }

      .slide .subtitle { font-size: 8.5px; }
      .slide .description,
      .zeuss-bullets li,
      .stat-value { font-size: 11.5px; }
    }

    .pdf-content {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .pdf-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(201,168,76,0.15);
      animation: fade-up 0.8s ease 0.2s both;
    }

    /* ---- ZEUSS ENG slides ---- */
    .zeuss-slide .slide-content {
      align-items: center;
    }

    /* Side-by-side layout for ZEUSS ENG slides */
    .slide.zeuss-slide.side-by-side {
      justify-content: center !important;
      align-items: center !important;
      gap: 42px;
    }

    .zeuss-slide.side-by-side .slide-content {
      flex: 0 1 500px;
      width: auto;
      max-width: 500px;
      margin: 0;
    }

    .zeuss-slide.side-by-side .slide-image {
      flex: 0 1 520px;
      width: auto;
      max-width: 520px;
    }

    .zeuss-slide.side-by-side .slide-image img {
      width: 100%;
      max-width: 100%;
      height: min(72vh, 760px);
      max-height: min(72vh, 760px);
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .zeuss-slide.side-by-side .slide-text {
      width: 100%;
      max-width: 500px;
    }

    .slide.hero-text-slide.has-image {
      gap: 42px;
    }

    .slide.hero-text-slide.has-image .slide-image {
      flex: 0 1 520px;
      max-width: 520px;
    }

    .slide.hero-text-slide.has-image .slide-content {
      flex: 0 1 620px;
      width: auto;
      max-width: 620px;
      margin: 0;
    }

    .zeuss-slide.side-by-side .slide-text::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 30%);
      opacity: 0.9;
    }

    /* Stat grid for core data */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
      animation: slide-in 0.8s ease 0.25s both;
    }

    .stat-item {
      padding: 10px 12px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(201,168,76,0.7);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .stat-value {
      font-family: var(--condensed);
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
    }

    /* Bullet list for ENG slides */
    .zeuss-bullets {
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
      animation: slide-in 0.8s ease 0.2s both;
    }

    .zeuss-bullets li {
      padding: 6px 0;
      font-size: clamp(13px, 2.5vw, 15px);
      color: rgba(240,235,224,0.88);
      border-bottom: 1px solid rgba(201,168,76,0.08);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .zeuss-bullets li::before {
      content: '▸';
      color: var(--gold);
      font-size: 10px;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .zeuss-bullets li:last-child { border-bottom: none; }

    .zeuss-bullets li.highlight {
      color: var(--gold);
      font-weight: 600;
    }

    /* Tag badge */
    .tag-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      padding: 4px 10px;
      border: 1px solid rgba(201,168,76,0.5);
      color: var(--gold);
      margin-bottom: 10px;
      text-transform: uppercase;
      animation: fade-up 0.6s ease both;
    }

    /* Scan line overlay on ZEUSS slides */
    .zeuss-slide::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Hero-text slide (where-others-fail, battleproof etc.) */
    .hero-text-slide .slide-content {
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .hero-text-slide .slide-text {
      text-align: center;
      padding: 32px 28px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 20px;
      max-width: 700px;
      position: relative;
      z-index: 10;
    }

    .hero-text-slide h2 {

<script>

  // Particle System
  class Particle {
    constructor(x, y, vx, vy, size) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.size = size;
      this.life = 1;
      this.decay = 0.015;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.1;
      this.life -= this.decay;
      this.size *= 0.98;
    }

    draw(ctx) {
      ctx.fillStyle = `rgba(201, 168, 76, ${this.life * 0.3})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const isMobileDevice = window.matchMedia('(max-width: 768px)').matches;
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas ? canvas.getContext('2d') : null;
  if (canvas && ctx && !isMobileDevice) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  let particles = [];
  let mouseX = canvas ? canvas.width / 2 : 0;
  let mouseY = canvas ? canvas.height / 2 : 0;

  if (canvas && ctx && !isMobileDevice) {
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (Math.random() > 0.85) {
        particles.push(new Particle(
          mouseX + (Math.random() - 0.5) * 30,
          mouseY + (Math.random() - 0.5) * 30,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          Math.random() * 1.5 + 0.5
        ));
      }
    });

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(ctx); });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      updateMobileImageLayout();
    });

    animateParticles();
  }

  // Utility: Create slide element with uniform structure
  function createSlide(config) {
    const slide = document.createElement('div');

    const imagePos = config.imagePos || 'right';
    
    // Strip HTML tags for alt text
    const stripHtml = (html) => html ? html.replace(/<[^>]*>/g, '') : '';
    const altText = stripHtml(config.title) || 'Slide';

    slide.className = `slide ${hasImage ? 'has-image' : 'no-image'} ${config.slideClass || ''}`;

    const tagBadgeHtml = config.tag ? `<div class="tag-badge">${config.tag}</div>` : '';
    const subtitleHtml = config.subtitle ? `<div class="subtitle">${config.subtitle}</div>` : '';
    const dividerHtml = config.title && (config.subtitle || config.description) ? '<div class="divider"></div>' : '';
    const descriptionHtml = config.description ? `<div class="description">${config.description}</div>` : '';
    const contentHtml = config.content || '';
    const imageHtml = hasImage ? `<div class="slide-image ${imagePos}"><img src="${config.image}" alt="${altText}" loading="lazy" decoding="async"></div>` : '';
    
    slide.innerHTML = `
      <div class="graphic-element graphic-circle" style="top: 10%; left: 5%; opacity:0.08;"></div>

  function setupVideoStability() {
    const video = document.querySelector('.video-player');
    if (!video) return;

    video.muted = true;
    video.playsInline = true;
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');

    const safePlay = () => {
      const promise = video.play();
      if (promise && typeof promise.catch === 'function') {
        promise.catch(() => {});
      }
    };

    video.addEventListener('loadedmetadata', safePlay, { once: true });
    video.addEventListener('canplay', safePlay, { once: true });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        video.pause();
      } else {
        safePlay();
      }
    });

    if (IS_MOBILE) {
      video.preload = 'metadata';
      video.setAttribute('poster', 'assets/images/img89.jpg');
      safePlay();
    }
  }

  function showSlide(n) {
    if (!slidesLoaded || isTransitioning || n < 0 || n >= totalSlides) return;

    isTransitioning = true;
    const slides = document.querySelectorAll('.slide');
    
    // Wow exit effect per slide attiva
    const activeSlide = document.querySelector('.slide.active');
    if (activeSlide) {
      activeSlide.classList.remove('active');
      activeSlide.classList.add('exiting');
      setTimeout(() => {
        activeSlide.classList.remove('exiting');
      }, 600);
    }
    
    // Mostra la nuova slide
    if (slides[n]) {
      slides[n].classList.add('active');
      slides[n].scrollTop = 0;
      const innerScrollable = slides[n].querySelector('.slide-text');
      if (innerScrollable) innerScrollable.scrollTop = 0;
      window.scrollTo(0, 0);
      // Trigger reflow per animazione
      void slides[n].offsetWidth;
    }
    
    document.getElementById('current-page').textContent = n + 1;
    currentSlide = n;

    // Spawn particles
    if (!IS_MOBILE && canvas && ctx) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(
          Math.random() * canvas.width,
          Math.random() * canvas.height,
          (Math.random() - 0.5) * 4,
          (Math.random() - 0.5) * 4,
          Math.random() * 2.5 + 0.8
        ));
      }
    }

    setTimeout(() => {
      isTransitioning = false;
    }, 600);
  }

  function setupEventListeners() {
    // Navigation buttons
    document.getElementById('next').addEventListener('click', () => {
      if (currentSlide < totalSlides - 1) {
        showSlide(currentSlide + 1);
      }
    });

    document.getElementById('prev').addEventListener('click', () => {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    });

    document.getElementById('first-slide').addEventListener('click', () => {
      showSlide(0);
    });

    document.getElementById('logout').addEventListener('click', () => {
      if (authEnabled) {
        sessionStorage.removeItem(SESSION_KEY);
        window.location.href = 'login.html';
      } else {
        showSlide(0);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        if (currentSlide < totalSlides - 1) {
          showSlide(currentSlide + 1);
        }
      } else if (e.key === 'ArrowLeft') {
        if (currentSlide > 0) {
          showSlide(currentSlide - 1);
        }
      }
    });

    // Mouse wheel scroll
    document.addEventListener('wheel', (e) => {
      const now = Date.now();
      if (now - lastScrollTime < scrollDebounce) return;
      lastScrollTime = now;

      if (e.deltaY > 0) {
        if (currentSlide < totalSlides - 1) {
          showSlide(currentSlide + 1);
        }
      } else if (e.deltaY < 0) {
        if (currentSlide > 0) {
          showSlide(currentSlide - 1);
        }
      }
    }, { passive: true });

    // Touch swipe
    let touchStartY = 0;
    let touchStartX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const touchEndY = e.changedTouches[0].clientY;
      const touchEndX = e.changedTouches[0].clientX;
      const diffY = touchStartY - touchEndY;
      const diffX = Math.abs(touchStartX - e.changedTouches[0].clientX);

      if (Math.abs(diffY) > 50 && diffX < 100) {
        const now = Date.now();
        if (now - lastScrollTime < scrollDebounce) return;
        lastScrollTime = now;

        if (diffY > 0) {
          if (currentSlide < totalSlides - 1) {
            showSlide(currentSlide + 1);
          }
        } else {
          if (currentSlide > 0) {
            showSlide(currentSlide - 1);
          }
        }
      }
    }, { passive: true });
  }

  function setupParallaxEffect() {
    if (window.matchMedia('(max-width: 768px)').matches) return;
    if (IS_MOBILE) return;
    const slides = document.querySelectorAll('.slide:not(.video-slide)');
    
    // Mouse tracking parallax on images
    slides.forEach((slide) => {
      const img = slide.querySelector('.slide-image img');
      const textEl = slide.querySelector('.slide-text');
      
      if (!img && !textEl) return;

      slide.addEventListener('mousemove', (e) => {
        const rect = slide.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        const offsetX = (x - 0.5) * 30;
        const offsetY = (y - 0.5) * 30;

        if (img && !img.parentElement.classList.contains('hidden')) {
          img.style.transform = `translate(${offsetX * 0.5}px, ${offsetY * 0.5}px) scale(1.08)`;
          img.style.transition = 'none';
        }

        if (textEl) {
          const rotX = (y - 0.5) * 8;
          const rotY = (x - 0.5) * -8;
          textEl.style.transform = `perspective(1200px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
          textEl.style.transition = 'none';
        }
      });

      slide.addEventListener('mouseleave', () => {
        if (img && !img.parentElement.classList.contains('hidden')) {
          img.style.transform = 'translate(0, 0) scale(1)';
          img.style.transition = 'all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        }
        if (textEl) {
          textEl.style.transform = 'perspective(1200px) rotateX(0) rotateY(0)';
          textEl.style.transition = 'all 0.3s ease';
        }
      });
    });

    // Advanced 3D text effect on h2
    const titles = document.querySelectorAll('.slide h2');
    titles.forEach(title => {
      const parentSlide = title.closest('.slide');
      if (!parentSlide) return;

      parentSlide.addEventListener('mousemove', (e) => {
        const rect = parentSlide.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const x = (e.clientX - rect.left - centerX) / centerX;
        const y = (e.clientY - rect.top - centerY) / centerY;
        
        const rotX = y * 6;
        const rotY = x * -6;
        const shiftX = x * 8;
        
        title.style.transform = `perspective(1200px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateX(${shiftX}px)`;
        title.style.transition = 'none';
      });

      parentSlide.addEventListener('mouseleave', () => {
        title.style.transform = 'perspective(1200px) rotateX(0) rotateY(0) translateX(0)';
        title.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      });
    });

    // Stagger animation on description text
    const descriptions = document.querySelectorAll('.slide .description');
    descriptions.forEach((desc) => {
      const slide = desc.closest('.slide');
      if (slide?.classList.contains('active')) {
        desc.style.animation = `slide-in 0.8s ease 0.2s both`;
      }
    });

    // Touch device: gyroscope-style tilt for ZEUSS slides
    if (window.DeviceOrientationEvent && window.innerWidth < 768) {
      window.addEventListener('deviceorientation', (e) => {
        const activeSlide = document.querySelector('.slide.active');
        if (!activeSlide) return;
        const img = activeSlide.querySelector('.slide-image img');
        if (!img) return;

        const tiltX = Math.max(-10, Math.min(10, e.beta - 45));
        const tiltY = Math.max(-10, Math.min(10, e.gamma));
        img.style.transform = `translate(${tiltY * 0.6}px, ${tiltX * 0.4}px) scale(1.06)`;
        img.style.transition = 'transform 0.1s linear';
      }, { passive: true });
    }
  }

  
  function initPublishSafeMode() {
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const video = document.querySelector('.video-player');
    if (!video) return;

    const tryPlay = () => {
      const promise = video.play();
      if (promise && typeof promise.catch === 'function') {
        promise.catch(() => {
          const resume = () => {
            video.play().catch(() => {});
          };
          document.addEventListener('touchstart', resume, { once: true, passive: true });
          document.addEventListener('click', resume, { once: true });
        });
      }
    };

    video.muted = true;
    video.defaultMuted = true;
    video.autoplay = true;
    video.loop = true;
    video.playsInline = true;
    video.setAttribute('muted', '');
    video.setAttribute('autoplay', '');
    video.setAttribute('loop', '');
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');

    if (isMobile) {
      tryPlay();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        try { video.pause(); } catch (e) {}
      } else if (currentSlide === 0) {
        tryPlay();
      }
    });
  }


  // Load slides when page is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSlides);
  } else {
    loadSlides();
  }
  

  window.addEventListener('load', () => {
    setTimeout(initPublishSafeMode, 120);
  });
</script>
